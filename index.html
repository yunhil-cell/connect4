<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>실시간 4목 (Connect 4)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth-screen">
    <h1>🔴 실시간 4목 🔵</h1>
    
    <button id="btn-create" class="btn-create">방 생성 (홍팀)</button>
    
    <div class="input-group">
        <input type="number" id="room-code-input" placeholder="방 코드 (4자리)" min="1000" max="9999">
        <button id="btn-join" class="btn-join">참여 (청팀)</button>
    </div>

    <div class="admin-group">
        <input type="password" id="admin-pw" placeholder="관리자 비밀번호">
        <button id="btn-reset-all" class="btn-reset">모든 방 초기화</button>
    </div>
    <button id="rule-btn" class="btn-rule">게임 규칙 보기</button>
</div>

<div id="game-screen" class="hidden">
    <div id="status-bar">
        <div id="room-info">방: <span id="display-room-code"></span> (<span id="my-team"></span>)</div>
        <div id="turn-indicator">대기 중...</div>
    </div>
    
    <div id="board">
        </div>

    <div id="result-overlay" class="hidden">
        <div id="result-box">
            <h1 id="result-text"></h1>
            <p>5초 후 대기실로 복귀합니다...</p>
        </div>
    </div>
</div>

<div id="rule-overlay" class="hidden">
    <div class="rule-box">
        <h2>게임 규칙</h2>
        <div class="rule-content">
            <p>1. 가로, 세로, 대각선으로 4개의 말을 먼저 연결하면 승리합니다.</p>
            <p>2. 자신의 차례에 원하는 열을 클릭하여 말을 놓으세요.</p>
            <p>3. 빨간색(홍팀)이 선공입니다.</p>
            <p>4. 상대방보다 먼저 4목을 완성하는 전략을 짜보세요!</p>
        </div>
        <button id="close-rule-btn" class="btn-rule">닫기</button>
    </div>
</div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
